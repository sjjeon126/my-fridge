<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>나만의 스마트 냉장고 APP</title>
<style>
  /* --- 디자인 콘셉트: Modern Skeuomorphism --- */
  :root {
    --bg-color: #f7f8fa;
    --app-width: 760px; 
    
    --fridge-metal: #dee3eb;
    --fridge-dark: #cbd2dc;
    --door-color: #f2f4f7;
    --border-color: #adb9c9;
    
    --curtain-color: #9b8293; 
    --curtain-shadow: rgba(0,0,0,0.15);
    --pantry-wicker: #c8b8d8; 
    
    --text-primary: #2e3440;
    --text-secondary: #5e6c7e;
  }

  body {
    font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 30px 20px;
    background-color: var(--bg-color);
    margin: 0;
    min-height: 100vh;
  }

  .app-frame {
    width: 100%;
    max-width: var(--app-width);
    background: #ffffff;
    border-radius: 40px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.06);
    /* 문이 프레임 밖으로 나올 수 있도록 overflow: hidden 삭제 */
    padding: 25px;
    display: flex;
    flex-direction: column;
    gap: 25px;
    box-sizing: border-box;
  }

  .app-header {
    text-align: center;
    padding-bottom: 15px;
    border-bottom: 2px solid #eaedf2;
  }
  .app-title {
    font-size: 1.6rem;
    font-weight: bold;
    color: var(--text-primary);
    margin: 0;
  }

  /* --- 1. 입력부 & AI 자동입력 디자인 --- */
  .input-section {
    background: #fdfcfa;
    border: 1px solid #eaeaea;
    border-radius: 20px;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 15px;
  }
  .input-section h3 {
    margin: 0;
    font-size: 1.15rem;
    color: var(--text-secondary);
  }
  
  .manual-input-wrapper {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
  }
  .input-group {
    flex: 1;
    min-width: 190px;
    display: flex;
    gap: 10px;
  }
  .input-group input {
    flex: 1;
    padding: 12px;
    border: 1px solid #dcdde1;
    border-radius: 10px;
    box-sizing: border-box;
    font-size: 14px;
    transition: border-color 0.2s;
  }
  .input-group input:focus { outline: none; border-color: var(--border-color); }
  .input-group button {
    width: 65px;
    padding: 12px;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    font-size: 14px;
    transition: opacity 0.2s;
  }

  .btn-freezer { background-color: #92b9ca; } 
  .btn-fridge { background-color: #a4be9a; }  
  .btn-basket { background-color: #a894c2; }  
  .input-group button:hover { opacity: 0.8; }

  .ai-input-wrapper {
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: #f4f6f9;
    padding: 15px;
    border-radius: 15px;
    border: 1px dashed #c0c9d6;
  }
  .ai-input-wrapper textarea {
    width: 100%;
    height: 60px;
    padding: 12px;
    border: 1px solid #dcdde1;
    border-radius: 10px;
    resize: none;
    font-size: 14px;
    box-sizing: border-box;
    font-family: inherit;
  }
  .ai-controls {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .ai-controls input[type="password"] {
    flex: 1;
    padding: 10px;
    border: 1px solid #dcdde1;
    border-radius: 8px;
    font-size: 12px;
  }
  .btn-ai {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-ai:hover { opacity: 0.9; }

  /* --- 2 & 3. 저장 공간 좌우 배치 래퍼 --- */
  .storage-wrapper {
    display: flex;
    gap: 20px;
    align-items: stretch;
    flex-direction: row;
  }

  @media (max-width: 768px) {
    .storage-wrapper { flex-direction: column; }
    .pantry-wrapper { min-height: 280px; }
  }

  /* --- 2. 냉장고 본체 디자인 --- */
  .fridge-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
    perspective: 1200px;
    transform-style: preserve-3d; /* 3D 효과가 부모를 뚫고 나오도록 허용 */
    z-index: 30; /* 팬트리보다 위로 올라오게 설정 */
    background: linear-gradient(135deg, var(--fridge-metal) 0%, var(--fridge-dark) 100%);
    padding: 18px;
    border-radius: 25px;
    box-shadow: 8px 8px 25px rgba(0,0,0,0.08), inset -3px -3px 10px rgba(255,255,255,0.4);
    position: relative;
  }
  .fridge-container::before {
    content: '';
    position: absolute;
    top: -5px;
    left: 50%;
    transform: translateX(-50%);
    width: 100px;
    height: 10px;
    background: var(--fridge-dark);
    border-radius: 10px;
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
  }

  .compartment {
    position: relative;
    width: 100%;
    background: #ffffff;
    border: 3px solid var(--border-color);
    border-radius: 15px;
    box-shadow: inset 0 0 15px rgba(0,0,0,0.04);
    /* overflow: hidden; 삭제하여 문이 밖으로 나갈 수 있게 함 */
  }
  .freezer { height: 180px; }
  .fridge { height: 280px; }

  /* --- 3. 실온 보관 팬트리 디자인 --- */
  .pantry-container { flex: 1; display: flex; }
  
  .pantry-wrapper {
    position: relative;
    width: 100%;
    height: 100%;
    border: 3px solid #a894c2;
    border-radius: 15px;
    background: 
      linear-gradient(135deg, var(--pantry-wicker) 25%, transparent 25%) -50px 0,
      linear-gradient(225deg, var(--pantry-wicker) 25%, transparent 25%) -50px 0,
      linear-gradient(315deg, var(--pantry-wicker) 25%, transparent 25%),
      linear-gradient(45deg, var(--pantry-wicker) 25%, transparent 25%);
    background-size: 20px 20px;
    background-color: #e3dff0;
    box-shadow: 0 8px 20px rgba(0,0,0,0.12), inset 0 5px 15px rgba(0,0,0,0.1);
    overflow: hidden;
  }

  .pantry-curtain {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: var(--curtain-color);
    background-image:
      linear-gradient(to right, rgba(0,0,0,0.08) 1px, transparent 1px),
      linear-gradient(to right, rgba(0,0,0,0.04) 12px, rgba(255,255,255,0.05) 12px);
    background-size: 2px 100%, 25px 100%;
    box-shadow: inset 0 2px 15px rgba(0,0,0,0.08), inset 0 0 25px rgba(0,0,0,0.05);
    cursor: pointer;
    z-index: 20;
    transform-origin: left;
    transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), background-size 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .pantry-curtain.open {
    transform: scaleX(0.15);
    background-size: 2px 100%, 6px 100%;
    opacity: 1;
    box-shadow: 8px 0 20px rgba(0,0,0,0.3);
  }

  .curtain-label {
    position: absolute;
    top: 20px;
    right: 25px;
    background: rgba(255,255,255,0.85);
    padding: 6px 15px;
    border-radius: 20px;
    font-weight: bold;
    font-size: 14px;
    color: #6a5266; 
    box-shadow: 0 3px 8px rgba(0,0,0,0.08);
    transition: opacity 0.5s;
    user-select: none;
  }
  .pantry-curtain.open .curtain-label { opacity: 0; }

  /* --- 공통 문 디자인 --- */
  .door {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: var(--door-color);
    border: 1px solid #dcdde1;
    border-radius: 12px;
    transform-origin: left;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    font-weight: bold;
    color: var(--text-primary);
    cursor: pointer;
    z-index: 10;
    user-select: none;
  }
  .door::after {
    content: '';
    position: absolute;
    right: 18px;
    top: 50%;
    transform: translateY(-50%);
    width: 14px; 
    height: 90px; 
    background: var(--border-color);
    border-radius: 6px;
    box-shadow: inset 1px 1px 3px rgba(255,255,255,0.4), 1px 1px 3px rgba(0,0,0,0.1);
  }
  
  /* 열렸을 때 z-index를 올려 화면 최상단으로 띄움 */
  .door.open { 
    transform: rotateY(-110deg); 
    box-shadow: 20px 5px 25px rgba(0,0,0,0.15); 
    z-index: 50; 
  }

  /* --- 내부 재료 디자인 --- */
  .contents {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    padding: 18px;
    overflow-y: auto;
    box-sizing: border-box;
    display: flex;
    flex-wrap: wrap;
    align-content: flex-start;
    gap: 8px;
    background-color: #ffffff;
    border-radius: 12px; /* 문에 가려졌던 둥근 모서리를 내부에 추가 */
    z-index: 5;
  }
  .pantry-wrapper .contents { background: transparent; padding: 20px; }

  .item {
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: bold;
    height: fit-content;
    box-shadow: 0 2px 6px rgba(0,0,0,0.04);
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    user-select: none;
    transition: transform 0.2s, opacity 0.2s;
  }
  .item:hover { transform: translateY(-2px) scale(1.02); opacity: 0.8; }

  .freezer .item { background: #e6f0f3; color: #5a8e9e; border: 1px solid #d9e7ea; }
  .fridge .item { background: #eff3ea; color: #6d8e64; border: 1px solid #e1e9db; }
  .pantry-wrapper .item { background: #f4f1f8; color: #7a6596; border: 1px solid #e1dced; }
  
  .item-count { font-size: 11px; background: white; padding: 2px 7px; border-radius: 12px; color: #888; border: 1px solid #eee; }

  /* --- 푸터 버튼 디자인 --- */
  .app-footer {
    display: flex;
    gap: 12px;
    padding-top: 20px;
    border-top: 2px solid #eaedf2;
  }
  .btn-action {
    flex: 1;
    color: white;
    border: none;
    padding: 14px;
    border-radius: 12px;
    font-weight: bold;
    font-size: 1rem;
    cursor: pointer;
    transition: background-color 0.2s, transform 0.1s;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.06);
  }
  .btn-action:active { transform: translateY(1px); }
  .btn-copy { background-color: #5e81ac; }
  .btn-copy:hover { background-color: #4c566a; }
  .btn-clear { background-color: #bf616a; }
  .btn-clear:hover { background-color: #d08770; }

</style>
</head>
<body>

  <div class="app-frame">
    <div class="app-header">
      <h1 class="app-title">📱 스마트 냉장고</h1>
    </div>

    <div class="input-section">
      <h3>🛒 장바구니 채우기</h3>
      
      <div class="manual-input-wrapper">
        <div class="input-group">
          <input type="text" id="freezerInput" placeholder="❄️ 아이스크림, 얼음" onkeypress="handleEnter(event, 'freezer')">
          <button class="btn-freezer" onclick="addItem('freezer')">추가</button>
        </div>
        <div class="input-group">
          <input type="text" id="fridgeInput" placeholder="🥦 계란, 우유" onkeypress="handleEnter(event, 'fridge')">
          <button class="btn-fridge" onclick="addItem('fridge')">추가</button>
        </div>
        <div class="input-group">
          <input type="text" id="pantryInput" placeholder="🧅 감자, 양파" onkeypress="handleEnter(event, 'pantry')">
          <button class="btn-basket" onclick="addItem('pantry')">추가</button>
        </div>
      </div>

      <div class="ai-input-wrapper">
        <textarea id="aiTextInput" placeholder="예: 방금 마트 다녀왔어! 사과 3개랑 우유 2개 샀고, 냉동실에 넣을 냉동만두도 하나 샀어. 아, 양파도 망으로 하나 샀다."></textarea>
        <div class="ai-controls">
          <input type="password" id="geminiApiKey" placeholder="여기에 Gemini API Key를 입력하세요 (저장됨)">
          <button class="btn-ai" onclick="processAIInput()" id="aiBtn">✨ AI 자동 분류</button>
        </div>
      </div>
    </div>

    <div class="storage-wrapper">
      <div class="fridge-container">
        <div class="compartment freezer">
          <div class="door" onclick="toggleElement(this)">❄️ 냉동고</div>
          <div class="contents" id="freezerContents"></div>
        </div>
        <div class="compartment fridge">
          <div class="door" onclick="toggleElement(this)">🥦 냉장고</div>
          <div class="contents" id="fridgeContents"></div>
        </div>
      </div>
      <div class="pantry-container">
        <div class="pantry-wrapper">
          <div class="pantry-curtain" onclick="toggleElement(this)">
            <span class="curtain-label">🧅 실온 보관 (팬트리)</span>
          </div>
          <div class="contents" id="pantryContents"></div>
        </div>
      </div>
    </div>

    <div class="app-footer">
      <button class="btn-action btn-copy" onclick="copyForAI()">📋 AI 레시피용 복사</button>
      <button class="btn-action btn-clear" onclick="clearAllItems()">🧹 전체 비우기</button>
    </div>
  </div>

  <script>
    const emojiDictionary = {
      '사과': '🍎', '바나나': '🍌', '포도': '🍇', '수박': '🍉', '딸기': '🍓', '복숭아': '🍑', '토마토': '🍅', '감자': '🥔',
      '당근': '🥕', '고추': '🌶️', '오이': '🥒', '상추': '🥬', '브로콜리': '🥦', '마늘': '🧄', '양파': '🧅', '버섯': '🍄',
      '식빵': '🍞', '빵': '🍞', '치즈': '🧀', '고기': '🥩', '소고기': '🥩', '돼지고기': '🥩', '닭고기': '🍗', '계란': '🥚',
      '우유': '🥛', '얼음': '🧊', '아이스크림': '🍦', '생선': '🐟', '새우': '🦐', '오징어': '🦑', '밥': '🍚', '면': '🍜',
      '만두': '🥟', '카레': '🍛', '물': '💧', '음료수': '🧃', '커피': '☕', '맥주': '🍺', '소주': '🍶'
    };

    let inventory = { freezer: [], fridge: [], pantry: [] };

    window.onload = function() {
      const savedData = localStorage.getItem('mySmartFridge_Data');
      if (savedData) {
        inventory = JSON.parse(savedData);
        renderAllContents();
      }
      
      const savedKey = localStorage.getItem('gemini_api_key');
      if (savedKey) {
        document.getElementById('geminiApiKey').value = savedKey;
      }
    }

    function saveData() {
      localStorage.setItem('mySmartFridge_Data', JSON.stringify(inventory));
    }

    function findEmoji(word) {
      for (const key in emojiDictionary) {
        if (word.includes(key)) return emojiDictionary[key];
      }
      return '📦';
    }

    function toggleElement(element) {
      element.classList.toggle('open');
    }

    function insertItemToInventory(type, name, count) {
      const pureName = name.replace(/^[^\s]+/, '').trim() || name;
      const existingItem = inventory[type].find(item => item.name === pureName);
      
      if (existingItem) {
        existingItem.count = (existingItem.count || 1) + count;
      } else {
        inventory[type].push({ name: pureName, emoji: findEmoji(name), count: count });
      }
      inventory[type].sort((a, b) => a.name.localeCompare(b.name));
    }

    function addItem(type) {
      const input = document.getElementById(type + 'Input');
      let value = input.value.trim();
      
      if (value !== '') {
        insertItemToInventory(type, value, 1);
        renderContents(type);
        saveData();
        input.value = '';
        input.focus();
      }
    }

    async function processAIInput() {
      const textInput = document.getElementById('aiTextInput').value.trim();
      const apiKey = document.getElementById('geminiApiKey').value.trim();
      const btn = document.getElementById('aiBtn');

      if (!apiKey) {
        alert("Gemini API Key를 입력해주세요.\n(Google AI Studio에서 무료 발급 가능합니다)");
        return;
      }
      if (!textInput) {
        alert("식재료가 적힌 줄글을 입력해주세요.");
        return;
      }

      localStorage.setItem('gemini_api_key', apiKey);

      btn.innerText = "⏳ AI 분석 중...";
      btn.disabled = true;

      const prompt = `
      다음 문장에서 식재료의 이름과 수량을 추출하고, 일반적인 보관 장소(freezer:냉동, fridge:냉장, pantry:실온)로 분류해줘.
      반드시 아래의 JSON 형식으로만 대답해. 마크다운 기호(\`\`\`)나 다른 설명은 절대 넣지 마.
      
      {"freezer": [{"name": "품목명", "count": 수량}], "fridge": [], "pantry": []}
      
      문장: "${textInput}"
      `;

      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }]
          })
        });

        const data = await response.json();
        
        if (data.error) throw new Error(data.error.message);

        let responseText = data.candidates[0].content.parts[0].text.trim();
        responseText = responseText.replace(/```json/g, "").replace(/```/g, "");
        
        const aiResult = JSON.parse(responseText);

        ['freezer', 'fridge', 'pantry'].forEach(type => {
          if (aiResult[type]) {
            aiResult[type].forEach(item => {
              insertItemToInventory(type, item.name, item.count || 1);
            });
          }
        });

        renderAllContents();
        saveData();
        
        document.getElementById('aiTextInput').value = ''; 
        alert("✨ AI가 식재료 정리를 완료했습니다!");

      } catch (error) {
        console.error("AI 처리 에러:", error);
        alert("분석 중 오류가 발생했습니다. API 키가 정확한지, 문장이 올바른지 확인해 주세요.");
      } finally {
        btn.innerText = "✨ AI 자동 분류";
        btn.disabled = false;
      }
    }

    function renderContents(type) {
      const contents = document.getElementById(type + 'Contents');
      contents.innerHTML = ''; 

      inventory[type].forEach(item => {
        const itemDiv = document.createElement('div');
        itemDiv.className = 'item';
        const countSpan = item.count > 1 ? `<span class="item-count">x${item.count}</span>` : '';
        itemDiv.innerHTML = `${item.emoji} ${item.name} ${countSpan}`;
        
        itemDiv.onclick = function() {
          if (confirm(`${item.name}을(를) 꺼낼까요?`)) {
            removeItem(type, item.name);
          }
        };
        contents.appendChild(itemDiv);
      });
    }

    function renderAllContents() {
      renderContents('freezer');
      renderContents('fridge');
      renderContents('pantry');
    }

    function removeItem(type, itemName) {
        inventory[type] = inventory[type].filter(item => item.name !== itemName);
        renderContents(type);
        saveData();
    }

    function clearAllItems() {
      if (confirm('냉장고를 완전히 비울까요? 모든 데이터가 사라집니다.')) {
        inventory = { freezer: [], fridge: [], pantry: [] };
        renderAllContents();
        saveData();
      }
    }

    function handleEnter(event, type) {
      if (event.key === 'Enter') addItem(type);
    }

    function copyForAI() {
      const getItemsText = (type) => {
        if (inventory[type].length === 0) return '없음';
        return inventory[type].map(item => item.count > 1 ? `${item.name}(${item.count}개)` : item.name).join(', ');
      };

      const aiPrompt = `현재 저희 집 식재료 보유 상태입니다:\n\n` +
                       `- ❄️ 냉동고: ${getItemsText('freezer')}\n` +
                       `- 🥦 냉장실: ${getItemsText('fridge')}\n` +
                       `- 🧅 실온 보관(팬트리): ${getItemsText('pantry')}\n\n` +

      navigator.clipboard.writeText(aiPrompt).then(() => {
