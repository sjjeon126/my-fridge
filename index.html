<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>나만의 스마트 냉장고 APP</title>
<style>
  :root {
    --bg-color: #f0f4f7;
    --app-width: 380px;
    --fridge-color: #d8dee9;
    --door-color: #eceff4;
    --border-color: #81a1c1;
  }

  body {
    font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 20px;
    background-color: var(--bg-color);
    margin: 0;
    min-height: 100vh;
  }

  .app-frame {
    width: var(--app-width);
    background: white;
    border-radius: 30px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.1);
    overflow: hidden;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 20px; /* 구역 간 간격 넓힘 */
  }

  .app-header {
    text-align: center;
    padding-bottom: 10px;
    border-bottom: 2px solid #e5e9f0;
  }
  .app-title {
    font-size: 1.5rem;
    font-weight: bold;
    color: #2e3440;
    margin: 0;
  }

  /* 입력 영역 */
  .input-section {
    background: #fdfbf7;
    border: 1px solid #dcdde1;
    border-radius: 15px;
    padding: 15px;
  }
  .input-section h3 {
    margin: 0 0 10px 0;
    font-size: 1.1rem;
    color: #5d616c;
  }
  .input-group {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }
  .input-group input {
    flex: 1;
    padding: 10px;
    border: 1px solid #bdc3c7;
    border-radius: 8px;
    box-sizing: border-box;
    font-size: 14px;
  }
  .input-group button {
    width: 60px;
    padding: 10px;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
  }
  .btn-freezer { background-color: #88c0d0; }
  .btn-fridge { background-color: #a3be8c; }
  .btn-basket { background-color: #d08770; }
  .input-group button:hover { opacity: 0.8; }

  /* 냉장고 본체 (실온 보관과 분리) */
  .fridge-container {
    display: flex;
    flex-direction: column;
    gap: 12px;
    perspective: 1200px;
    background: #e5e9f0;
    padding: 15px;
    border-radius: 15px;
    box-shadow: 5px 5px 15px rgba(0,0,0,0.1), inset -2px -2px 10px rgba(255,255,255,0.5);
  }

  .compartment {
    position: relative;
    width: 100%;
    background: #ffffff;
    border: 3px solid var(--border-color);
    border-radius: 12px;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
    overflow: hidden;
  }
  .freezer { height: 160px; }
  .fridge { height: 260px; }

  /* 실온 보관 바스켓 (완전 독립된 디자인) */
  .pantry-container {
    margin-top: 5px;
  }
  .wicker-basket {
    height: 180px;
    border: 3px solid #b57a62;
    border-radius: 12px;
    background: 
      linear-gradient(135deg, #d08770 25%, transparent 25%) -50px 0,
      linear-gradient(225deg, #d08770 25%, transparent 25%) -50px 0,
      linear-gradient(315deg, #d08770 25%, transparent 25%),
      linear-gradient(45deg, #d08770 25%, transparent 25%);
    background-size: 20px 20px;
    background-color: #c07761;
    box-shadow: 0 8px 15px rgba(0,0,0,0.15), inset 0 5px 15px rgba(0,0,0,0.1);
    position: relative;
    padding: 15px;
  }
  .basket-label {
    position: absolute;
    top: -12px;
    left: 15px;
    background: #fff3e0;
    border: 2px solid #d08770;
    padding: 4px 12px;
    border-radius: 20px;
    font-weight: bold;
    font-size: 14px;
    color: #c0392b;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }

  /* 문 스타일 */
  .door {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: var(--door-color);
    border: 1px solid #bdc3c7;
    border-radius: 10px;
    transform-origin: left;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    font-weight: bold;
    color: #4c566a;
    cursor: pointer;
    z-index: 10;
  }
  .door::after {
    content: '';
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    width: 10px;
    height: 70px;
    background: var(--border-color);
    border-radius: 5px;
  }
  .door.open { transform: rotateY(-115deg); }

  /* 내부 재료 */
  .contents {
    padding: 15px;
    height: 100%;
    overflow-y: auto;
    box-sizing: border-box;
    display: flex;
    flex-wrap: wrap;
    align-content: flex-start;
    gap: 8px;
    background-color: #ffffff;
  }
  .wicker-basket .contents {
    background: transparent;
    padding: 15px 0 0 0;
  }

  /* 아이템 태그 */
  .item {
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: bold;
    height: fit-content;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    user-select: none;
  }
  .item:hover {
    transform: translateY(-2px);
    opacity: 0.7;
    text-decoration: line-through;
  }
  .freezer .item { background: #e0f7fa; color: #00838f; border: 1px solid #b2ebf2; }
  .fridge .item { background: #e3f2fd; color: #1565c0; border: 1px solid #bbdefb; }
  .pantry .item { background: #fff3e0; color: #e65100; border: 1px solid #ffe0b2; }
  .item-count { font-size: 11px; background: white; padding: 2px 6px; border-radius: 10px; color: #666; }

  /* 푸터 버튼 (복사 및 비우기) */
  .app-footer {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding-top: 15px;
    border-top: 2px solid #e5e9f0;
  }
  .btn-action {
    color: white;
    border: none;
    padding: 12px;
    border-radius: 10px;
    font-weight: bold;
    font-size: 1rem;
    cursor: pointer;
    transition: background-color 0.2s;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
  }
  .btn-copy { background-color: #5e81ac; }
  .btn-copy:hover { background-color: #4c566a; }
  .btn-clear { background-color: #bf616a; }
  .btn-clear:hover { background-color: #d08770; }

</style>
</head>
<body>

  <div class="app-frame">
    <div class="app-header">
      <h1 class="app-title">📱 스마트 냉장고</h1>
    </div>

    <div class="input-section">
      <h3>장바구니 채우기</h3>
      <div class="input-group">
        <input type="text" id="freezerInput" placeholder="❄️ 아이스크림, 얼음" onkeypress="handleEnter(event, 'freezer')">
        <button class="btn-freezer" onclick="addItem('freezer')">추가</button>
      </div>
      <div class="input-group">
        <input type="text" id="fridgeInput" placeholder="🥦 계란, 우유, 사과" onkeypress="handleEnter(event, 'fridge')">
        <button class="btn-fridge" onclick="addItem('fridge')">추가</button>
      </div>
      <div class="input-group">
        <input type="text" id="pantryInput" placeholder="🧅 감자, 양파, 빵" onkeypress="handleEnter(event, 'pantry')">
        <button class="btn-basket" onclick="addItem('pantry')">추가</button>
      </div>
    </div>

    <div class="fridge-container">
      <div class="compartment freezer">
        <div class="door" onclick="toggleDoor(this)">❄️ 냉동고</div>
        <div class="contents" id="freezerContents"></div>
      </div>
      <div class="compartment fridge">
        <div class="door" onclick="toggleDoor(this)">🥦 냉장고</div>
        <div class="contents" id="fridgeContents"></div>
      </div>
    </div>

    <div class="pantry-container">
      <div class="wicker-basket">
        <span class="basket-label">🧅 실온 보관</span>
        <div class="contents" id="pantryContents"></div>
      </div>
    </div>

    <div class="app-footer">
      <button class="btn-action btn-copy" onclick="copyForAI()">📋 AI 레시피용 재료 복사하기</button>
      <button class="btn-action btn-clear" onclick="clearAllItems()">🧹 냉장고 전체 비우기</button>
    </div>
  </div>

  <script>
    const emojiDictionary = {
      '사과': '🍎', '바나나': '🍌', '포도': '🍇', '수박': '🍉', '딸기': '🍓', '복숭아': '🍑', '토마토': '🍅', '감자': '🥔',
      '당근': '🥕', '고추': '🌶️', '오이': '🥒', '상추': '🥬', '브로콜리': '🥦', '마늘': '🧄', '양파': '🧅', '버섯': '🍄',
      '식빵': '🍞', '빵': '🍞', '치즈': '🧀', '고기': '🥩', '소고기': '🥩', '돼지고기': '🥩', '닭고기': '🍗', '계란': '🥚',
      '우유': '🥛', '얼음': '🧊', '아이스크림': '🍦', '생선': '🐟', '새우': '🦐', '오징어': '🦑', '밥': '🍚', '면': '🍜',
      '만두': '🥟', '카레': '🍛', '물': '💧', '음료수': '🧃', '커피': '☕', '맥주': '🍺', '소주': '🍶'
    };

    let inventory = { freezer: [], fridge: [], pantry: [] };

    window.onload = function() {
      const savedData = localStorage.getItem('mySmartFridge');
      if (savedData) {
        inventory = JSON.parse(savedData);
        renderAllContents();
      }
    }

    function saveData() {
      localStorage.setItem('mySmartFridge', JSON.stringify(inventory));
    }

    function findEmoji(word) {
      for (const key in emojiDictionary) {
        if (word.includes(key)) return emojiDictionary[key];
      }
      return '📦';
    }

    function toggleDoor(door) {
      door.classList.toggle('open');
    }

    function addItem(type) {
      const input = document.getElementById(type + 'Input');
      let value = input.value.trim();
      
      if (value !== '') {
        const pureName = value.replace(/^[^\s]+/, '').trim() || value;
        const existingItem = inventory[type].find(item => item.name === pureName);
        
        if (existingItem) {
          existingItem.count = (existingItem.count || 1) + 1;
        } else {
          inventory[type].push({ name: pureName, emoji: findEmoji(value), count: 1 });
        }

        inventory[type].sort((a, b) => a.name.localeCompare(b.name));
        renderContents(type);
        saveData();

        input.value = '';
        input.focus();
      }
    }

    function renderContents(type) {
      const contents = document.getElementById(type + 'Contents');
      contents.innerHTML = ''; 

      inventory[type].forEach(item => {
        const itemDiv = document.createElement('div');
        itemDiv.className = 'item';
        const countSpan = item.count > 1 ? `<span class="item-count">x${item.count}</span>` : '';
        itemDiv.innerHTML = `${item.emoji} ${item.name} ${countSpan}`;
        
        itemDiv.onclick = function() {
          removeItem(type, item.name);
        };
        
        contents.appendChild(itemDiv);
      });
    }

    function renderAllContents() {
      renderContents('freezer');
      renderContents('fridge');
      renderContents('pantry');
    }

    function removeItem(type, itemName) {
      inventory[type] = inventory[type].filter(item => item.name !== itemName);
      renderContents(type);
      saveData();
    }

    function clearAllItems() {
      if (confirm('냉장고를 완전히 비울까요?')) {
        inventory = { freezer: [], fridge: [], pantry: [] };
        renderAllContents();
        saveData();
      }
    }

    function handleEnter(event, type) {
      if (event.key === 'Enter') addItem(type);
    }

    // ✨ AI용 텍스트 복사 기능
    function copyForAI() {
      const getItemsText = (type) => {
        if (inventory[type].length === 0) return '없음';
        return inventory[type].map(item => item.count > 1 ? `${item.name}(${item.count}개)` : item.name).join(', ');
      };

      const aiPrompt = `현재 저희 집 식재료 보유 상태입니다:\n\n` +
                       `- ❄️ 냉동고: ${getItemsText('freezer')}\n` +
                       `- 🥦 냉장실: ${getItemsText('fridge')}\n` +
                       `- 🧅 실온 보관: ${getItemsText('pantry')}\n\n` +
                       `이 재료들을 최대한 활용해서 만들 수 있는 맛있고 간단한 요리 레시피 3가지를 추천해 줘. 부족한 양념류는 기본적으로 집에 있다고 가정해도 좋아.`;

      // 클립보드에 복사
      navigator.clipboard.writeText(aiPrompt).then(() => {
        alert("✅ 재료 목록과 AI 프롬프트가 복사되었습니다!\nChatGPT나 챗봇에 바로 [붙여넣기] 해보세요.");
      }).catch(err => {
        alert("복사에 실패했습니다. 기기 설정을 확인해 주세요.");
      });
    }
  </script>

</body>
</html>
